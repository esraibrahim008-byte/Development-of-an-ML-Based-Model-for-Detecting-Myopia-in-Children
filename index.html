<!DOCTYPE html>
<html>
<head>
    <title>Myopia Detection System</title>
 <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="predict-page">


<div class="menu-container">
    <button class="menu-btn">☰</button>

    <div class="menu-content">
        <a href="/">Home</a>
        <a href="/prediction">Prediction</a>
        <a href="/about">About</a>
    </div>
</div>
<div class="container">

    <h1>Myopia Detection System</h1>

    <form action="/predict" method="post">

        <label>Age:</label><br>
        <input type="number" name="age" required><br><br>

        <label>Sports Hours:</label><br>
        <input type="number" name="sporthr" required><br><br>

        <label>TV Hours:</label><br>
        <input type="number" name="tvhr" required><br><br>

        <label>Mother Myopia (0 = No, 1 = Yes):</label><br>
        <input type="number" name="mommy" min="0" max="1" required><br><br>

        <label>Father Myopia (0 = No, 1 = Yes):</label><br>
        <input type="number" name="dadmy" min="0" max="1" required><br><br>

        <label>SPHEQ:</label><br>
        <input type="number" step="any" name="spheq" required><br><br>

        <button type="submit">Predict</button>

    </form>

    {% if prediction %}
        <h2>Result: {{ prediction }}</h2>
    {% endif %}

</body>
</html>
